name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # NOTE: deliberately NOT installing pytest-homeassistant-custom-component
      # here — it pulls in pytest-socket, which blocks the real HTTP this tier
      # needs. Only the lightweight REST deps are installed.
      - name: Install integration test deps
        run: pip install pytest requests websockets

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: custom_components/example_integration/frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix custom_components/example_integration/frontend

      - name: Build panel JS
        run: bash ci/build-panel.sh

      - name: Start Home Assistant
        working-directory: tests/integration
        run: docker compose up -d

      - name: Wait for Home Assistant to start
        run: |
          echo "Waiting for Home Assistant..."
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8123/api/ 2>/dev/null || true)
            if [ "$code" = "200" ] || [ "$code" = "401" ]; then
              echo "Home Assistant is responding (HTTP $code, attempt $i)"
              exit 0
            fi
            echo "Attempt $i/60 - HTTP $code - waiting..."
            sleep 2
          done
          echo "Home Assistant failed to start within 120s"
          (cd tests/integration && docker compose logs)
          exit 1

      - name: Run integration tests
        run: bash ci/test-python-integration.sh

      - name: Dump Home Assistant logs on failure
        if: failure()
        working-directory: tests/integration
        run: docker compose logs homeassistant

      - name: Cleanup
        if: always()
        working-directory: tests/integration
        run: docker compose down -v
