name: Bug report
description: Report a problem with the integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: input
    id: integration-version
    attributes:
      label: Integration version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Logs from Settings → System → Logs (and the browser console for panel/card issues).
      render: shell
