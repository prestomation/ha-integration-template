[tool.pytest.ini_options]
testpaths = ["tests"]
# Note: asyncio_mode is set per-invocation by the component/integration runners
# (it requires the pytest-asyncio plugin, which only the HA harness installs).
# The pure unit tier (tests/unit) needs no asyncio config.

[tool.coverage.run]
source = ["custom_components/example_integration"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

# Strict typing is a Platinum quality-scale practice. CI (lint.yml) runs `mypy
# custom_components/example_integration` with Home Assistant installed so HA's own
# types resolve; keep the integration error-free. The template demonstrates the
# practice without declaring a quality_scale tier in the manifest (see README).
# Target 3.13 to match modern Home Assistant (it uses 3.13-only typing syntax, so a
# lower target makes mypy fail to even parse HA's own sources).
[tool.mypy]
python_version = "3.13"
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
# A pragmatic-but-meaningful set: pyflakes/pycodestyle, import sorting, pyupgrade,
# bugbear, comprehensions, simplify, and Ruff's own rules. Mirrors the spirit of
# Home Assistant core's linting without being maximally pedantic.
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM", "RUF"]

[tool.ruff.lint.isort]
# Treat Home Assistant as a third-party package (it is, for a custom component).
known-third-party = ["homeassistant"]

[tool.ruff.lint.per-file-ignores]
# Tests may use assert and slightly looser style.
"tests/**" = ["B011"]

